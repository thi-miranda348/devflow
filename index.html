<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlow - Issue Finder</title>
</head>
<body>
    <div class="app-container">

        <aside class="app-sidebar">
            <div class="sidebar-header">Logo & Title</div>
            <nav class="sidebar-nav">Navigation Links</nav>
            <div class="sidebar-footer">Connect GitHub & Settings</div>
        </aside>

        <main class="app-main">

            <header class="top-navbar">
                <nav class="navbar-left">Explore, Repositories, Stats</nav>
                <div class="navbar-search">
                    <input type="text" class="search-input" placeholder="Quick search..." />
                </div>
                <div class="navbar-right">Notifications & Profile</div>
            </header>

            <div class="dashboard-content">

                <aside class="filter-sidebar">
                    Quick Filters (Language, Difficulty)
                </aside>

                <section class="main-canvas">
                    <div class="hero-search-area">
                        <h2>Find your next contribution</h2>
                        <input type="text" class="main-search-input" />
                        <button class="btn-primary">Fetch Issues</button>
                    </div>

                    <div class="results-grid">
                        </div>
                </section>

            </div>
        </main>
    </div>
</body>
</html>
